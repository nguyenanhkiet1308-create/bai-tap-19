<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Card Game - Baitap19</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="game-container">
        <header>
            <h1>Trò Chơi Ghép Thẻ</h1>
            <div class="stats">
                <p>Số lượt đi: <span id="move-count">0</span></p>
            </div>
        </header>

        <section class="game-grid" id="game-grid">
            <!-- Thẻ sẽ được tạo tự động bằng JS -->
        </section>

        <footer class="controls">
            <button id="reset-btn">Chơi lại</button>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
